name: Cross-Platform Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_build:
    name: Build & Test on ${{ matrix.os }} / Py ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 cmake setuptools wheel ninja pytest

      - name: Set up MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build and Install RC-TUI (Unix)
        if: runner.os != 'Windows'
        run: pip install -e .

      - name: Build and Install RC-TUI (Windows)
        if: runner.os == 'Windows'
        run: pip install .

      - name: Smoke Test (Import)
        run: |
          python -c "import rc_tui; print('RC-TUI version:', rc_tui.__version__ if hasattr(rc_tui, '__version__') else '0.2.0')"

      - name: Run Unit Tests
        run: |
          cd tests
          pytest test_advanced_styling.py test_styling.py test_framework.py
