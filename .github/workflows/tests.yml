name: Cross-Platform Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test_build:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 cmake setuptools wheel ninja

      - name: Build and Install MTUI
        run: pip install -e .

      - name: Smoke Test (Import)
        run: |
          python -c "import rc_tui; print('MTUI Core Version:', rc_tui.__version__ if hasattr(rc_tui, '__version__') else '0.1.0')"
          python -c "from rc_tui import App; print('App imported successfully')"

      - name: Run Logic Tests
        run: |
          python tests/test_cross_platform.py
          python tests/test_framework.py
